# Trade Show App - served under platform base path /apps/trade-show
# Include this inside the server {} block of the frontend container (LXC 2120).
# Root for the app is the same as main site; SPA files live under .../current/apps/trade-show/.

# Exact redirect to trailing slash
location = /apps/trade-show {
    return 301 /apps/trade-show/;
}

# Serve SPA under subpath — ^~ prevents regex locations from hijacking asset requests
location ^~ /apps/trade-show/ {
    root /var/www/trade-show-app/current;
    index index.html;
    try_files $uri $uri/ /apps/trade-show/index.html;
}
